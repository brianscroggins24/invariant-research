    notes: Practitioner execution methodology; VWAP, liquidity-depth treatment, and threshold selection require precise source verification.
  - claim_id: CLM-0018
    statement: The article says the dependency pipeline uses DeepSeek-R1-Distill-Qwen-32B and pairwise dependency analysis, producing 40,057 independent pairs, 1,576 dependent pairs, 374 cases satisfying the article's strict conditions, and 13 manually verified exploitable pairs.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0004
        locator: "Part V: The Complete System (What Actually Got Deployed)"
    related_pages:
