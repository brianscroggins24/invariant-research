schema_version: 1
claims:
  - claim_id: CLM-0001
    statement: Conventional RAG workflows retrieve relevant source fragments at query time but do not maintain a persistent, incrementally synthesized knowledge artifact.
    claim_type: source-claim
    status: reviewed
    sources:
      - source_id: SRC-0002
        locator: "The core idea"
    related_pages:
      - SOURCE-SUMMARY-0001
    notes:
  - claim_id: CLM-0002
    statement: "An LLM Wiki consists of three primary layers: immutable raw sources, an LLM-maintained wiki, and a schema that governs the agent's behavior."
    claim_type: source-claim
    status: reviewed
    sources:
      - source_id: SRC-0002
        locator: "Architecture"
    related_pages:
      - SOURCE-SUMMARY-0001
      - PROCESS-0001
    notes:
  - claim_id: CLM-0003
    statement: Ingest, query, and lint are the core recurring operations of an LLM-maintained wiki.
    claim_type: source-claim
    status: reviewed
    sources:
      - source_id: SRC-0002
        locator: "Operations"
    related_pages:
      - SOURCE-SUMMARY-0001
      - PROCESS-0001
    notes:
  - claim_id: CLM-0004
    statement: The wiki index should be content-oriented, while the log should provide a chronological record of wiki activity.
    claim_type: source-claim
    status: reviewed
    sources:
      - source_id: SRC-0002
        locator: "Indexing and logging"
    related_pages:
      - SOURCE-SUMMARY-0001
    notes:
  - claim_id: CLM-0005
    statement: Market Rebalancing Arbitrage occurs when the sum of YES token prices across a market's conditions is below 1 for a long opportunity or above 1 for a short opportunity.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0003
        locator: "Section 3.2.1 (P7)"
    related_pages:
      - SOURCE-SUMMARY-0002
    notes:
  - claim_id: CLM-0006
    statement: Combinatorial Arbitrage arises between two dependent markets when a portfolio of bets across both markets guarantees at least one winning payoff and the market-value inequality of the constructed portfolio makes it profitable.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0003
        locator: "Section 3.2.2 and Definition 4 (P8)"
    related_pages:
      - SOURCE-SUMMARY-0002
    notes:
  - claim_id: CLM-0007
    statement: The authors reduce markets with more than four conditions by retaining the four conditions with the greatest traded volume and adding a fifth logical-OR condition for the remaining outcomes.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0003
        locator: "Section 5.1 (P12-13)"
    related_pages:
      - SOURCE-SUMMARY-0002
    notes:
  - claim_id: CLM-0008
    statement: On the U.S. election subset, the authors report 40,057 independent market pairs and 1,576 dependent market pairs, then manually confirm 11 NegRisk-NegRisk and 2 NegRisk-Single pairs as combinatorial arbitrage.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0003
        locator: "Section 5.2 and Section 6.3 (P13, P17)"
    related_pages:
      - SOURCE-SUMMARY-0002
    notes:
  - claim_id: CLM-0009
    statement: Within single conditions, 7,051 of 17.2K conditions had at least one arbitrage opportunity under the authors' thresholds, and all observed opportunities were long.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0003
        locator: "Section 6.1 (P14-15), Figure 6"
    related_pages:
      - SOURCE-SUMMARY-0002
    notes:
  - claim_id: CLM-0010
    statement: Across all strategies, assuming ε = $1 profit per trade, the authors estimate $39,587,585.02 of total extracted profit, with the highest-profit account generating $2,009,631.76.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0003
        locator: "Section 7.4 (P20), Table 1"
    related_pages:
      - SOURCE-SUMMARY-0002
    notes:
  - claim_id: CLM-0011
    statement: The paper frames arbitrage detection as a scalable search problem because a naive analysis across related markets requires exponential-time comparisons over the combined condition space.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0003
        locator: "Abstract and Section 1.1 (P0-P1)"
    related_pages:
      - SOURCE-SUMMARY-0002
    notes:
  - claim_id: CLM-0012
    statement: Candidate market pairs are reduced by assigning each market to a topic with Linq-Embed-Mistral embeddings, then restricting dependency checks to markets that share the same topic and end date.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0003
        locator: "Section 4.1.1 and Section 4.1 (P9-10)"
    related_pages:
      - SOURCE-SUMMARY-0002
    notes:
  - claim_id: CLM-0013
    statement: The paper treats arbitrage execution as non-atomic because the orders required for different legs execute separately, so some legs may succeed while others fail and leave the trader exposed.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0003
        locator: "Section 3.2.1 and Section 7.2 (P7, P18-19)"
    related_pages:
      - SOURCE-SUMMARY-0002
    notes:
  - claim_id: CLM-0014
    statement: The article frames arbitrage detection across dependent markets as a scalable search problem because naive pairwise verification over combined condition spaces grows exponentially.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0004
        locator: "Part I: The Marginal Polytope Problem (Why Simple Math Fails)"
    related_pages:
      - SOURCE-SUMMARY-0003
    notes:
  - claim_id: CLM-0015
    statement: The article says the Bregman projection of the current market state onto the marginal polytope yields the maximum guaranteed profit and identifies trading direction and size.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0004
        locator: "Part II: Bregman Projection (How to Actually Remove Arbitrage)"
    related_pages:
      - SOURCE-SUMMARY-0003
    notes: Practitioner interpretation; direct executable sizing and direction require verification against the cited theoretical paper.
  - claim_id: CLM-0016
    statement: The article says Frank-Wolfe with an integer-programming oracle and Gurobi makes projection tractable.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0004
        locator: "Part III: The Frank-Wolfe Algorithm (Making It Computationally Tractable)"
    related_pages:
      - SOURCE-SUMMARY-0003
    notes: Theoretical description; verify the Frank-Wolfe attribution against the separately cited combinatorial-market-making paper.
  - claim_id: CLM-0021
    statement: The article reports that Frank-Wolfe typically converges in 50 to 150 iterations on markets with thousands of conditions.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0004
        locator: "Part III: The Frank-Wolfe Algorithm (Making It Computationally Tractable)"
    related_pages:
      - SOURCE-SUMMARY-0003
    notes: Performance figure reported by the article; verify against the underlying source material before treating it as corroborated.
  - claim_id: CLM-0022
    statement: The article reports a 38% median improvement on security prices once projections become practically fast.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0004
        locator: "Part III: The Frank-Wolfe Algorithm (Making It Computationally Tractable)"
    related_pages:
      - SOURCE-SUMMARY-0003
    notes: Performance figure reported by the article; primary-source verification is required.
  - claim_id: CLM-0017
    statement: The article says Polymarket CLOB execution is non-atomic, so one leg may fill while another fails and leave the trader exposed.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0004
        locator: "Part IV: Execution Under Non-Atomic Constraints (Why Order Books Change Everything)"
    related_pages:
      - SOURCE-SUMMARY-0003
    notes: Non-atomic execution is broadly supported; precise execution methodology requires verification against the cited source.
  - claim_id: CLM-0023
    statement: The article uses VWAP and liquidity depth to estimate profit and cites a $0.05 minimum threshold for filtering opportunities.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0004
        locator: "Part IV: Execution Under Non-Atomic Constraints (Why Order Books Change Everything)"
    related_pages:
      - SOURCE-SUMMARY-0003
    notes: Practitioner execution methodology; VWAP, liquidity-depth treatment, and threshold selection require precise source verification.
  - claim_id: CLM-0018
    statement: The article says the dependency pipeline uses DeepSeek-R1-Distill-Qwen-32B and pairwise dependency analysis, producing 40,057 independent pairs, 1,576 dependent pairs, 374 cases satisfying the article's strict conditions, and 13 manually verified exploitable pairs.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0004
        locator: "Part V: The Complete System (What Actually Got Deployed)"
    related_pages:
      - SOURCE-SUMMARY-0003
    notes: Article-reported figures; candidate-filtering details from `SRC-0003` must not be attributed to this article.
  - claim_id: CLM-0019
    statement: The article proposes a modified Kelly-style sizing rule that incorporates execution probability and caps positions at 50% of order-book depth.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0004
        locator: "Part V: The Complete System (What Actually Got Deployed)"
    related_pages:
      - SOURCE-SUMMARY-0003
    notes: Practitioner recommendation; not validated production configuration.
  - claim_id: CLM-0020
    statement: The article reports $39,688,585 of total extracted profit, $2,009,632 for the top single extractor, and 4,049 transactions.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0004
        locator: "Part V: The Complete System (What Actually Got Deployed)"
    related_pages:
      - SOURCE-SUMMARY-0003
    notes: Article-reported figures; the aggregate total materially conflicts with `SRC-0003`, and the top-trader value is rounded from the primary-paper figure.
  - claim_id: CLM-0024
    statement: The marginal polytope M is the convex hull of valid payoff vectors, and it is exactly the set of coherent prices that can be represented as expectations under some probability distribution over outcomes.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0005
        locator: "Section 2.2 (p. 5)"
    related_pages:
      - SOURCE-SUMMARY-0004
    notes: Direct support for the marginal-polytope definition and the coherent-price interpretation.
  - claim_id: CLM-0025
    statement: "The paper represents valid payoff vectors with a compact integer-program description Z = { z in {0,1}^I : A^T z >= b }, avoiding explicit enumeration of the outcome space."
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0005
        locator: "Section 2.3 and Example 2.5 (p. 5)"
    related_pages:
      - SOURCE-SUMMARY-0004
    notes: Direct support for the compact IP representation claim.
  - claim_id: CLM-0026
    statement: Proposition 2.4 shows that the guaranteed profit of any trader from state θ is at most D(μ*∥θ), and that bound is achieved by any trade that moves the market to a state θ* with p(θ*) = μ*.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0005
        locator: "Section 2.2 and Appendix A (p. 5, p. 19)"
    related_pages:
      - SOURCE-SUMMARY-0004
    notes: Direct support for the profit/Bregman-projection link; not a standalone sizing rule.
  - claim_id: CLM-0027
    statement: Fully-corrective Frank-Wolfe reduces the Bregman projection problem to repeated linear optimization problems over the vertex set Z.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0005
        locator: "Section 2.3 and Section 4.1 (p. 10-11)"
    related_pages:
      - SOURCE-SUMMARY-0004
    notes: Direct support for the Frank-Wolfe reduction.
  - claim_id: CLM-0028
    statement: In FWMM, the linear-optimization oracle is an IP solver, and the experiments use Gurobi Optimizer 5.53.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0005
        locator: "Section 4.1 and Section 5.2 (p. 11, p. 15)"
    related_pages:
      - SOURCE-SUMMARY-0004
    notes: Direct support for the oracle/solver implementation detail.
  - claim_id: CLM-0029
    statement: The projection objective has a boundary differentiability problem for LMSR, because the Bregman divergence is only subdifferentiable and the gradient can blow up near the boundary of the feasible region.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0005
        locator: "Section 4.1 and Appendix C (p. 11, p. 21)"
    related_pages:
      - SOURCE-SUMMARY-0004
    notes: Direct support for the controlled-gradient / boundary issue.
  - claim_id: CLM-0030
    statement: To handle the boundary issue, FWMM contracts the feasible set to a polytope of the form M' = (1 - ε) M^σ + εu, with u chosen as an interior coherent price point.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0005
        locator: "Section 4.1 and Section 4.3 (p. 11-12)"
    related_pages:
      - SOURCE-SUMMARY-0004
    notes: Direct support for the contraction treatment.
  - claim_id: CLM-0031
    statement: The adaptive contracted Frank-Wolfe analysis shows that the duality gap converges to zero and that the non-contracted projection problem is solved under the controlled-growth assumption.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0005
        locator: "Section 4.1 and Appendix C (p. 12, p. 21)"
    related_pages:
      - SOURCE-SUMMARY-0004
    notes: Direct support for the convergence claim.
  - claim_id: CLM-0032
    statement: The NCAA tournament evaluation uses a combinatorial market with an outcome space of size 2^63.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0005
        locator: "Abstract and Section 5.2 (p. 1, p. 15)"
    related_pages:
      - SOURCE-SUMMARY-0004
    notes: The paper directly states the 2^63 outcome-space size for the NCAA tournament evaluation.
  - claim_id: CLM-0033
    statement: The paper reports that the first successful projection occurs only after 45 games are already settled, that projection is capped at 30 minutes on a standard workstation, and that the replay took about 5 hours to execute trades that originally spanned 22 days.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0005
        locator: "Sections 5.2 and 6 (p. 16, p. 18)"
    related_pages:
      - SOURCE-SUMMARY-0004
    notes: Direct support for empirical tractability and runtime findings.
  - claim_id: CLM-0034
    statement: FWMM outperforms LCMM in forecast accuracy; once projections succeed, the paper reports median improvements of 38% for variables and 9% for bundles, while the across-all-hourly-summary medians are 3.3% and 2.2% respectively.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0005
        locator: "Section 5.2 (p. 16-17)"
    related_pages:
      - SOURCE-SUMMARY-0004
    notes: Direct support for comparative pricing accuracy; the 38% figure is an accuracy improvement, not a production deployment guarantee.
  - claim_id: CLM-0035
    statement: The author says they built an autonomous trading platform in six days that connects to three financial exchanges, ingests news from RSS, web searches, Reddit, and Twitter, uses an LLM to analyze markets and decide when prices are wrong, sizes positions with Kelly criterion, manages risk, and routes orders across venues.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0006
        locator: "Lines 16-20 and 26"
    related_pages:
      - SOURCE-SUMMARY-0005
    notes: Direct first-person build account and platform description; the article also says the system runs around the clock and spans 50 modules.
  - claim_id: CLM-0036
    statement: The article cites a March 2026 survey of 906 developers and a SemiAnalysis estimate to argue that Claude Code is widely used among AI coding-agent users, that it authored about 4% of public GitHub contributions, and that the share could reach 20% by year-end.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0006
        locator: "Line 28"
    related_pages:
      - SOURCE-SUMMARY-0005
    notes: Article-cited evidence; these are reported survey and estimate figures, not measurements performed by the article.
  - claim_id: CLM-0037
    statement: The article says Polymarket already shows bot-like behavior, including reports that 14 of its 20 most profitable accounts are bots and that more than 30% of wallets are operated by AI agents.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0006
        locator: "Line 30"
    related_pages:
      - SOURCE-SUMMARY-0005
    notes: Third-party-reported market statistics cited by the article; not independently verified in this ingestion.
  - claim_id: CLM-0038
    statement: The article says regulators and researchers warn that widespread use of common AI models or model monocultures could increase market correlations, amplify stress, and heighten systemic vulnerabilities.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0006
        locator: "Lines 38-40"
    related_pages:
      - SOURCE-SUMMARY-0005
    notes: This claim captures the article's cited institutional warnings and its monoculture framing.
  - claim_id: CLM-0039
    statement: The article says the current regulatory lens focuses on regulated firms, while the relevant agentic traders may be unregulated individuals without reporting obligations, compliance departments, capital requirements, or circuit breakers.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0006
        locator: "Lines 44-50"
    related_pages:
      - SOURCE-SUMMARY-0005
    notes: Journalistic analysis about a monitoring blind spot; it is an argument about oversight scope, not an observed market fact.
  - claim_id: CLM-0040
    statement: The article says prediction markets are the proving ground, that similar AI trading tools are being adopted across foreign exchange, equities, and credit markets, and that roughly 70% of spot FX activity is electronically executed.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0006
        locator: "Lines 52-54"
    related_pages:
      - SOURCE-SUMMARY-0005
    notes: Article-stated market-scope claim plus a cited execution-share statistic.
  - claim_id: CLM-0041
    statement: The article presents a hypothetical scenario in which similar-model agents simultaneously downgrade a mid-sized economy, unwind positions, and trigger a rapid cascade into sovereign funding stress.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0006
        locator: "Lines 56-64"
    related_pages:
      - SOURCE-SUMMARY-0005
    notes: Explicitly hypothetical scenario used to illustrate a potential feedback loop; not an observed event.
  - claim_id: CLM-0042
    statement: The article argues that agentic herds move at machine speed, leaving no gap for human intervention, and that the aggregate effect is a global correlation-risk problem rather than a single-strategy failure.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0006
        locator: "Lines 66-72"
    related_pages:
      - SOURCE-SUMMARY-0005
    notes: Journalist analysis and synthesis; a forward-looking risk argument, not direct empirical evidence.
  - claim_id: CLM-0043
    statement: The article recommends model-use disclosure, correlation-aware circuit breakers, mandatory registration for autonomous trading systems, and resilience planning for small open economies.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0006
        locator: "Lines 74-80"
    related_pages:
      - SOURCE-SUMMARY-0005
    notes: Policy recommendations attributed to the article, not validated operating controls.
  - claim_id: CLM-0044
    statement: The article forecasts that prediction markets may be almost entirely machine-versus-machine within a year, most liquid financial markets within three years, and that institutions will need to adapt within five years.
    claim_type: source-claim
    status: review-required
    sources:
      - source_id: SRC-0006
        locator: "Line 82"
    related_pages:
      - SOURCE-SUMMARY-0005
    notes: Long-horizon forecast; treat as the author's prediction rather than established fact.
